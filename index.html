<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optics Sketch — 2D optical setup builder</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="toolbar" role="toolbar" aria-label="Sketch tools">
    <div class="brandblock">
      <span class="brand">Optics Sketch</span>
      <span class="model-badge">Qualitative ray tracing</span>
    </div>
    <div class="toolgroup examples-group">
      <select id="exampleSel" aria-label="Load a pre-made example setup" title="Load a pre-made example setup">
        <option value="">Examples…</option>
      </select>
    </div>
    <div class="toolgroup file-group" aria-label="File actions">
      <button type="button" id="btnNew" title="New sketch">New</button>
      <button type="button" id="btnOpen" title="Open .json sketch">Open</button>
      <button type="button" id="btnSave" title="Save sketch as .json">Save</button>
      <button type="button" id="btnShare" title="Copy a self-contained link to this sketch">Share</button>
    </div>
    <div class="toolgroup history-group" aria-label="History">
      <button type="button" id="btnUndo" title="Undo (⌘Z)" aria-label="Undo">↩︎</button>
      <button type="button" id="btnRedo" title="Redo (⇧⌘Z)" aria-label="Redo">↪︎</button>
    </div>
    <div class="toolgroup draw-group" aria-label="Drawing tools">
      <button type="button" id="btnFiber" title="Draw an optical fiber patch cable: click waypoints, double-click to finish">Fiber</button>
    </div>
    <span class="spacer"></span>
    <div class="toolgroup export-group" aria-label="Export actions">
      <button type="button" id="btnSVG" class="primary" title="Export vector SVG">Export SVG</button>
      <button type="button" id="btnPNG" title="Export PNG (3×)">PNG</button>
    </div>
    <input type="file" id="fileInput" accept=".json,application/json" hidden>
  </header>
  <dialog id="shareDialog" class="share-dialog" aria-labelledby="shareTitle">
    <div class="share-dialog-head">
      <div><span class="eyebrow">Self-contained setup</span><h2 id="shareTitle">Share this sketch</h2></div>
      <button type="button" id="shareClose" class="icon-button" aria-label="Close share dialog">×</button>
    </div>
    <div id="shareQR" class="share-qr"></div>
    <p id="shareQRNote" class="share-qr-note">Scan to open this exact optical setup.</p>
    <label class="share-url-label" for="shareURL">Complete setup URL</label>
    <textarea id="shareURL" class="share-url" rows="3" readonly></textarea>
    <div class="share-actions">
      <button type="button" id="shareCopy" class="primary">Copy link</button>
      <button type="button" id="shareDownloadQR">Download QR SVG</button>
    </div>
  </dialog>
  <main>
    <aside id="palette" aria-label="Element palette"></aside>
    <div id="canvasWrap">
      <!-- biome-ignore lint/a11y/noNoninteractiveTabindex: this SVG is the app's interactive pointer and keyboard workspace -->
      <svg id="canvas" role="application" aria-label="Optical setup canvas" tabindex="0"></svg>
      <div id="toolMode" role="status" aria-live="polite"></div>
      <div id="viewControls" class="canvas-controls" aria-label="Canvas view controls">
        <button type="button" id="btnGrid" class="active" aria-pressed="true" title="Toggle table hole grid">Grid</button>
        <button type="button" id="btnSnap" class="active" aria-pressed="true" title="Toggle snapping">Snap</button>
        <button type="button" id="btnFocal" class="active" aria-pressed="true" title="Show focal points of lenses and curved mirrors">ƒ</button>
        <span class="control-divider"></span>
        <button type="button" id="btnZoomOut" title="Zoom out" aria-label="Zoom out">−</button>
        <button type="button" id="btnZoomIn" title="Zoom in" aria-label="Zoom in">+</button>
        <button type="button" id="btnZoomFit" title="Fit sketch in view">Fit</button>
      </div>
      <div id="pulseControls" class="pulse-controls is-idle" role="toolbar" aria-label="Pulse playback controls">
        <button type="button" id="btnPulsePlay" title="Play pulse animation" aria-label="Play pulse animation">▶</button>
        <button type="button" id="btnPulseReset" title="Reset pulse clock" aria-label="Reset pulse clock">↺</button>
        <select id="pulseDisplay" aria-label="Pulse display scale" aria-describedby="pulseScaleNote" title="Detector timing is physical in both modes; physical packet widths may be enlarged for visibility">
          <option value="schematic">Schematic packets</option>
          <option value="physical">Physical spacing</option>
        </select>
        <select id="pulseSpeed" aria-label="Simulation time speed">
          <option value="1">1 ns/s</option>
          <option value="10" selected>10 ns/s</option>
          <option value="100">100 ns/s</option>
        </select>
        <span id="pulseScaleNote" class="pulse-scale-note">packets schematic · timing physical</span>
      </div>
      <div id="status"></div>
      <div id="contextMenu" class="context-menu" role="menu" aria-label="Object actions" hidden>
        <button type="button" role="menuitem" data-action="duplicate"><span>Duplicate</span><kbd>⌘D</kbd></button>
        <button type="button" role="menuitem" data-action="rotate"><span>Rotate 45°</span><kbd>R</kbd></button>
        <button type="button" role="menuitem" data-action="delete" class="context-danger"><span>Delete</span><kbd>⌫</kbd></button>
      </div>
    </div>
    <aside id="inspector" aria-label="Properties"></aside>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
