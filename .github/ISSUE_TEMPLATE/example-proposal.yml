name: Propose a community setup
description: Submit an OpticalSetup scene for review and possible inclusion in the Community section.
title: "[Example proposal] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an optical setup. After submission, an automated workflow validates the scene and opens a draft pull request for maintainer review.

  - type: input
    id: setup_name
    attributes:
      label: Setup name
      description: Use a concise, descriptive name suitable for the Community section.
      placeholder: Balanced Mach–Zehnder interferometer
    validations:
      required: true

  - type: textarea
    id: demonstration
    attributes:
      label: What does this setup demonstrate?
      description: Explain the optical idea, learning outcome, and any setup-dependent limitations.
      placeholder: This setup demonstrates…
    validations:
      required: true

  - type: textarea
    id: setup_link
    attributes:
      label: OpticalSetup share link
      description: This self-contained link is generated by the Propose action in the workbench.
      placeholder: https://opticalsetup.com/sketch/#sketch=…
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: Reference (optional)
      description: A paper, textbook, or link this setup is based on, if any.
      placeholder: Hecht, Optics, 5th ed., §9.4
    validations:
      required: false

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Contribution acknowledgement
      options:
        - label: I created or have permission to share this setup, and I understand that it will be publicly reviewed and may be modified if accepted.
          required: true
